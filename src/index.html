<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Blockly Farming Game</title>
</head>
<body>
<div id="app" class="App">
    <div class="App-body">
        <div class="blockly-panel">
            <div id="blocklyDiv"></div>
            <div id="shortcuts"></div>
            <button id="runCodeButton" class="run-code-button">Run Code</button>
        </div>

        <div class="game-panel">
            <div class="game-controls">
                <button id="resetGameBtn">Reset Game</button>
                <select id="levelSelect">
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                </select>
            </div>
            <div class="game-container" id="gameContainer">
                <div class="day-counter">Day: <span id="dayCount">1</span></div>
                <div class="farm-grid" id="farmGrid">
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
